name: Generate Landing Page

on:
  workflow_dispatch:
    inputs:
      doelgroep:
        description: "Voor wie is deze pagina?"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate HTML
        run: |
          doelgroep="${{ github.event.inputs.doelgroep }}"
          filename=$(echo "$doelgroep" | tr ' ' '-' | tr '[:upper:]' '[:lower:]').html

          cat > "$filename" <<'EOF'
          <!DOCTYPE html>
          <html lang="nl">
          <head>
            <meta charset="UTF-8">
            <title>SUPRSLIM weekmenu</title>
          </head>
          <body style="font-family: Arial; max-width:600px; margin:80px auto;">
            <h1>Nooit meer nadenken over eten</h1>
            <p>Ontvang elke week een simpel, gezond en goedkoop SUPRSLIM weekmenu.</p>

            <h2>Wat je krijgt</h2>
            <ul>
              <li>5 dagen weekmenu</li>
              <li>Boodschappenlijst</li>
              <li>Snelle recepten</li>
            </ul>

            <button style="padding:15px;font-size:18px;">
              Download gratis weekmenu
            </button>
          </body>
          </html>
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Nieuwe landingspagina" || echo "Geen wijzigingen"
          git push
