name: Generate Landing Page

on:
  workflow_dispatch:
    inputs:
      doelgroep:
        description: "Voor wie is deze pagina?"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate HTML
        run: |
          doelgroep="${{ github.event.inputs.doelgroep }}"
          filename=$(echo "$doelgroep" | tr ' ' '-' | tr '[:upper:]' '[:lower:]').html

          cat > "$filename" <<EOF
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPRSLIM weekmenu</title>

<style>
body {margin:0;font-family:Arial;background:#f4fbf5;color:#163020;}
.hero {padding:60px 20px;text-align:center;}
h1 {font-size:36px;}
.cta {background:#ff7a3d;color:white;padding:15px;border-radius:10px;text-decoration:none;display:inline-block;margin-top:20px;}
</style>
</head>

<body>

<div class="hero">
<h1>Nooit meer nadenken over eten ($doelgroep)</h1>
<p>Ontvang elke week een simpel en gezond weekmenu.</p>
<a class="cta">Download gratis weekmenu</a>
</div>

</body>
</html>
EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Nieuwe pagina" || echo "geen wijzigingen"
          git push
