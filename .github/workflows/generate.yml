      - name: Generate HTML
        run: |
          doelgroep="${{ github.event.inputs.doelgroep }}"
          filename=$(echo "$doelgroep" | tr ' ' '-' | tr '[:upper:]' '[:lower:]').html

          cat > "$filename" <<EOF
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gratis SUPRSLIM weekmenu voor $doelgroep</title>
  <style>
    body {
