<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPRSLIM landingspagina's</title>
  <style>
    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      margin: 0;
      background: linear-gradient(135deg, #f6fbf4, #ffffff);
      color: #14251a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      width: min(640px, calc(100% - 32px));
      padding: 34px;
      border: 1px solid #dce9d7;
      border-radius: 28px;
      background: #fff;
      box-shadow: 0 18px 55px rgba(20, 37, 26, .10);
      text-align: center;
    }

    h1 { margin: 0 0 12px; letter-spacing: -.05em; }
    p { color: #5f705f; line-height: 1.6; }
    a {
      display: inline-flex;
      margin-top: 12px;
      border-radius: 14px;
      background: #ff7a3d;
      color: white;
      padding: 14px 18px;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>SUPRSLIM</h1>
    <p>De landingspagina gebruikt nu een shadcn-geïnspireerde kaartlayout en een conversiegerichte aanvraagflow.</p>
    <a href="drukke-gezinnen.html">Bekijk de geoptimaliseerde pagina →</a>
  </main>
</body>
</html>
