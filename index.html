<!DOCTYPE html>
<html lang="nl">
<head>

    .card { max-width: 760px; background: #fff; border-radius: 32px; padding: 42px; box-shadow: 0 18px 50px rgba(23, 53, 31, .12); }

    p { color: #52685a; font-size: 18px; line-height: 1.65; }
    .links { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-top: 28px; }
    a { display: block; padding: 18px; border-radius: 18px; background: #17351f; color: #fff; text-decoration: none; font-weight: 900; }
    a:nth-child(2) { background: #1f8f4d; }
    a:nth-child(3) { background: #ff7a3d; }
  </style>
</head>

        <a href="drukke-gezinnen.html">Funnel voor drukke gezinnen</a>
